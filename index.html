<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricky</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <header>
        <img src="img/Logo.png" alt="Logo Cricky" width="120">

        <nav>
            <a href="#">Inicio</a>
            <a href="#">Viajes</a>
            <a href="#">Carrito 🛒 (<span id="contador">0</a>)</a>
            <a href="#">Iniciar sesion</a>
            <a href="#">Registrarse</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Exprora el mundo con Cricky</h1>
        <p>Los mejores destinos al mejor precio</p>

    <section id="productos" class="productos"></section>

    <section class="carrito">

    <section id="pagos">
        <h2>Pagos comodos y seguros</h2>
        <img src="img/visa.png" width="50">

    <section id="contacto">

        <p>Escribannos al WhatsApp 300 000 0000 o llamannos al 601 450 1234</p>
    </section>

    <script src="JS/app.js"></script>
